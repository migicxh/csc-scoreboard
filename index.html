
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC Broadcast Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="scoreboard">

    <div class="team home">
        <img id="homeLogo" class="logo" src="https://placehold.co/48x48" alt="Home Logo">
        <span id="homeName" class="team-name">HOME FC</span>
        <span id="homeScore" class="score">0</span>
    </div>

    <div class="center">
        <div id="clock" class="clock">00:00</div>
        <div id="period" class="period">1ST</div>
    </div>

    <div class="team away">
        <span id="awayScore" class="score">0</span>
        <span id="awayName" class="team-name">AWAY FC</span>
        <img id="awayLogo" class="logo" src="https://placehold.co/48x48" alt="Away Logo">
    </div>

</div>

<div id="goalBanner">
    ⚽ GOAL!
</div>

<script src="overlay.js"></script>

</body>
</html>
