
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC Broadcast Control v2</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    width:700px;
    margin:30px auto;
    background:#1d1d1d;
    padding:25px;
    border-radius:15px;
}

h1{
    text-align:center;
}

input,select,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:18px;
    border:none;
    border-radius:8px;
}

.row{
    display:flex;
    gap:10px;
}

.row button{
    flex:1;
}

.timerButtons button{
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>⚽ CSC Broadcast Graphics</h1>

<h2>Teams</h2>

<input id="homeName" placeholder="Home Team">

<input id="awayName" placeholder="Away Team">

<h2>Score</h2>

<div class="row">
<button onclick="changeScore('home',-1)">➖ Home</button>
<button onclick="changeScore('home',1)">➕ Home</button>
</div>

<div class="row">
<button onclick="changeScore('away',-1)">➖ Away</button>
<button onclick="changeScore('away',1)">➕ Away</button>
</div>

<h2>Match Period</h2>

<select id="period">
<option>1ST</option>
<option>2ND</option>
<option>ET</option>
<option>PENS</option>
</select>

<h2>Clock</h2>

<input id="clock" value="00:00">

<div class="row timerButtons">
<button onclick="startClock()">▶ START</button>
<button onclick="pauseClock()">⏸ PAUSE</button>
<button onclick="resetClock()">🔄 RESET</button>
</div>

<button onclick="updateOverlay()">
💾 Update Overlay
</button>

<button onclick="resetMatch()">
🗑 Reset Match
</button>

</div>

<script src="control.js"></script>

</body>
</html>
