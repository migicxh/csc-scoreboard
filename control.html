
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC Broadcast Control</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body{
            background:#202020;
            color:white;
            padding:30px;
            font-family:Arial,Helvetica,sans-serif;
        }

        .panel{
            max-width:700px;
            margin:auto;
        }

        input,select,button{
            width:100%;
            padding:10px;
            margin:8px 0;
            font-size:18px;
        }

        .row{
            display:flex;
            gap:10px;
        }

        .row button{
            flex:1;
        }

        h2{
            margin-top:30px;
        }
    </style>
</head>
<body>

<div class="panel">

<h1>CSC Broadcast Graphics</h1>

<h2>Teams</h2>

<input id="homeName" placeholder="Home Team">
<input id="awayName" placeholder="Away Team">

<h2>Score</h2>

<div class="row">
<button onclick="changeScore('home',-1)">HOME -</button>
<button onclick="changeScore('home',1)">HOME +</button>
</div>

<div class="row">
<button onclick="changeScore('away',-1)">AWAY -</button>
<button onclick="changeScore('away',1)">AWAY +</button>
</div>

<h2>Match</h2>

<select id="period">
<option>1ST</option>
<option>2ND</option>
<option>ET</option>
<option>PENS</option>
</select>

<input id="clock" placeholder="00:00">

<button onclick="updateOverlay()">Update Overlay</button>

<button onclick="resetMatch()">Reset Match</button>

</div>

<script src="control.js"></script>

</body>
</html>
