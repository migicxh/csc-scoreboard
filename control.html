
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC Scoreboard Control Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="background:#111;color:#fff;font-family:Arial,sans-serif;padding:30px;">

<h1>CSC Scoreboard Control Panel</h1>

<h2>Teams</h2>

<label>Home Team</label><br>
<input id="homeTeamName" type="text" placeholder="Home Team"><br><br>

<label>Away Team</label><br>
<input id="awayTeamName" type="text" placeholder="Away Team"><br><br>

<h2>Score</h2>

<label>Home Score</label><br>
<input id="homeScore" type="number" min="0" value="0"><br><br>

<label>Away Score</label><br>
<input id="awayScore" type="number" min="0" value="0"><br><br>

<h2>Clock</h2>

<button id="startTimer">▶ Start</button>
<button id="stopTimer">⏸ Pause</button>
<button id="resetTimer">🔄 Reset</button>

<br><br>

<label>Match Period</label><br>
<select id="matchPeriod">
<option value="1">1st Half</option>
<option value="2" selected>2nd Half</option>
<option value="3">Extra Time</option>
<option value="4">Penalties</option>
</select>

<br><br>

<label>Stoppage Time</label><br>
<input id="stoppageTime" type="number" value="0">

<script src="control.js"></script>

</body>
</html>
