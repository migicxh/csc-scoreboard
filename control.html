
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC Broadcast Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSC Broadcast Control Panel</h1>

<div class="controls">

    <h2>Teams</h2>

    <label>Home Team</label>
    <input id="homeNameInput" type="text" value="HOME FC">

    <label>Away Team</label>
    <input id="awayNameInput" type="text" value="AWAY FC">

    <h2>Score</h2>

    <button onclick="changeScore('home',-1)">Home -</button>
    <button onclick="changeScore('home',1)">Home +</button>

    <button onclick="changeScore('away',-1)">Away -</button>
    <button onclick="changeScore('away',1)">Away +</button>

    <h2>Match</h2>

    <label>Period</label>
    <select id="periodInput">
        <option>1ST</option>
        <option>2ND</option>
        <option>ET</option>
        <option>PENS</option>
    </select>

    <label>Clock</label>
    <input id="clockInput" type="text" value="00:00">

    <div style="margin-top:20px;">
        <button onclick="startClock()">▶ Start</button>
        <button onclick="pauseClock()">⏸ Pause</button>
        <button onclick="resetClock()">🔄 Reset Clock</button>
    </div>

    <div style="margin-top:20px;">
        <button onclick="updateOverlay()">💾 Update Overlay</button>
        <button onclick="resetMatch()">Reset Match</button>
    </div>

</div>

<script src="control.js"></script>

</body>
</html>
